<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书签</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    max-width: 680px;
    width: 100%;
    padding: 40px 24px;
  }
  h1 {
    font-size: 18px;
    color: #333;
    margin-bottom: 24px;
    font-weight: 600;
  }
  .bookmark {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border-radius: 12px;
    padding: 16px 20px;
    text-decoration: none;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    transition: box-shadow .2s, transform .2s;
  }
  .bookmark:hover {
    box-shadow: 0 4px 12px rgba(0,0,0,.12);
    transform: translateY(-1px);
  }
  .icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; font-weight: 700;
    flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0; }
  .title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 3px;
  }
  .url {
    font-size: 12px;
    color: #999;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hint {
    margin-top: 32px;
    font-size: 13px;
    color: #999;
    text-align: center;
    line-height: 1.8;
  }
  .hint a { color: #667eea; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>书签</h1>
  <a class="bookmark" href="https://yun-ai-base.github.io/population-report/" target="_blank">
    <div class="icon">📊</div>
    <div class="info">
      <div class="title">中国人口变局综合分析报告</div>
      <div class="url">yun-ai-base.github.io/population-report</div>
    </div>
  </a>
  <a class="bookmark" href="https://yun-ai-base.github.io/rss-reader/" target="_blank">
    <div class="icon">R</div>
    <div class="info">
      <div class="title">RSS Reader</div>
      <div class="url">yun-ai-base.github.io/rss-reader</div>
    </div>
  </a>
  <a class="bookmark" href="https://yun-ai-base.github.io/vpn-guide/" target="_blank">
    <div class="icon">🛡️</div>
    <div class="info">
      <div class="title">VPN 选购指南</div>
      <div class="url">yun-ai-base.github.io/vpn-guide</div>
    </div>
  </a>
  <div class="hint">
    用 Safari 打开此页面，点击分享按钮 → <strong>添加到个人收藏</strong><br>
    或直接按 <strong>Ctrl+D</strong> (Win) / <strong>Cmd+D</strong> (Mac) 添加到浏览器书签
  </div>
</div>
</body>
</html>
