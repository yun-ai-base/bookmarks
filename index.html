<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目导航 · yun-ai-base</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='12' y='8' width='76' height='84' rx='8' fill='%23c9a84c'/%3E%3Crect x='20' y='16' width='60' height='68' rx='4' fill='%23121214'/%3E%3Cpath d='M32 40h36M32 52h28M32 64h22' stroke='%23c9a84c' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --card: #121214;
  --card-hover: #1a1a1e;
  --border: #1e1e22;
  --text: #e4e2dd;
  --dim: #7a7872;
  --muted: #4a4844;
  --accent: #c9a84c;
  --accent-dim: rgba(201,168,76,0.12);
  --green: #4a9e6f;
  --cat-ai: #4a7fc9;
  --cat-tool: #c9a84c;
  --cat-content: #c94a4a;
  --cat-data: #8a6fc9;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}
.header {
  padding: 60px 24px 40px;
  text-align: center;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.02em;
  position: relative;
}
.header h1 span {
  background: linear-gradient(135deg, var(--accent), #e8d5a3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  margin-top: 8px;
  font-size: 14px;
  color: var(--dim);
  font-weight: 300;
}
.header .count {
  display: inline-block;
  margin-top: 16px;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 12px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(201,168,76,0.2);
}
.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 20px 80px;
}
.section { margin-bottom: 40px; }
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-title .emoji { font-size: 18px; }
.section-title h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  transition: all 0.25s;
  min-width: 0;
}
.card:hover {
  background: var(--card-hover);
  border-color: rgba(201,168,76,0.25);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.card-icon.ai { background: rgba(74,127,201,0.15); }
.card-icon.tool { background: var(--accent-dim); }
.card-icon.content { background: rgba(201,74,74,0.15); }
.card-icon.data { background: rgba(138,111,201,0.15); }
.card { border-left: 3px solid transparent; }
.card:hover { border-left-color: var(--card-cat, var(--muted)); }
.card-info { flex: 1; min-width: 0; }
.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-desc {
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-arrow {
  color: var(--muted);
  font-size: 14px;
  flex-shrink: 0;
  transition: transform 0.25s, color 0.25s;
}
.card:hover .card-arrow {
  transform: translateX(3px);
  color: var(--accent);
}
.footer {
  text-align: center;
  padding: 40px 24px;
  font-size: 12px;
  color: var(--muted);
}
.footer .dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 5px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--dim);
  font-size: 14px;
}
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeInUp 0.4s ease both; }
.search-wrap {
  margin: 20px auto 0;
  max-width: 400px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap .search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}
@media (max-width: 640px) {
  .header { padding: 40px 20px 30px; }
  .header h1 { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>yun-ai-base · <span>项目导航</span></h1>
  <p>所有 GitHub Pages 项目的统一入口 · 搜索筛选快速定位</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="搜索项目名称或关键词..." autocomplete="off">
  </div>
  <div class="count" id="count">加载中…</div>
</div>

<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <div>正在获取项目列表…</div>
  </div>
  <div id="content"></div>
</div>

<div class="footer">
  <span class="dot"></span>
  <span id="status">自动同步 GitHub Pages 项目</span>
</div>

<script>
const FALLBACK = [
  { name: 'population-report', desc: '中国人口变局 — 多维数据综合分析报告',         icon: '📊', cat: 'data' },
  { name: 'zhihu-curated',     desc: '知乎回答精选 · 用什么方法能尽快改变自己？', icon: '📖', cat: 'content' },
  { name: 'zhihu-wudao',       desc: '知乎回答精选 · 最近你悟通了什么道理/现象？', icon: '💡', cat: 'content' },
  { name: 'collection',        desc: '个人内容收藏库 · AI 驱动的知识管理与检索',      icon: '📚', cat: 'content' },
  { name: 'research-frontiers', desc: '科学突破前沿 · 全球科研突破聚合与AI解读',   icon: '🔬', cat: 'content' },
  { name: 'project-atlas',    desc: '项目总览 · Project Atlas — 所有项目统一入口',  icon: '🗺️', cat: 'tool' },
  { name: 'bookmarks',         desc: '个人书签导航页（就是本页）',                 icon: '🔖', cat: 'tool' },
  { name: 'rss-reader',        desc: 'RSS reader · 静态版',                       icon: '📡', cat: 'tool' },
  { name: 'hot-trending',      desc: 'Hot trending aggregator · 热门趋势聚合',      icon: '🔥', cat: 'tool' },
  { name: 'vpn-guide',         desc: '2026 VPN 选购指南 · 旗舰/平价/机场/免费对比', icon: '🛡️', cat: 'tool' },
  { name: 'tool-collection',   desc: '实用工具集 · 在线工具聚合导航',                icon: '🧰', cat: 'tool' },
  { name: 'cognitive-biases-atlas', desc: '认知星图 · 21种思维谬误可视化交互图谱', icon: '🧠', cat: 'tool' },
  { name: 'morris-quotes',     desc: 'Morris 语录集 · 100 条认知洞察与智慧点评',    icon: '✨', cat: 'content' },
  { name: 'ai-chat-room',      desc: 'AI 聊天室 · 多模型对话界面',                 icon: '💬', cat: 'ai' },
  { name: 'cosmic-discussion', desc: '宇宙大爆炸 · AI 终端深度对话可视化',          icon: '🌌', cat: 'ai' },
  { name: 'being-towards-death', desc: '向死而生 · AI 终端哲学对话可视化',          icon: '🕯️', cat: 'ai' },
  { name: 'ocean-studio',      desc: '海洋工作室 · 创意交互实验空间',               icon: '🌊', cat: 'ai' },
  { name: 'philomap',          desc: '哲学星球 · 40位哲学家的交互式思想星图',          icon: '🌌', cat: 'content' },
  { name: 'teacher-trend',     desc: '江苏省教师招聘数据可视化分析',               icon: '📊', cat: 'data' },
  { name: 'writers-gallery',   desc: '百位作家画廊 · 中外作家文学宇宙',               icon: '📚', cat: 'content' },
  { name: 'psychscope',        desc: '心智探索 · 心理学大师知识图谱',                 icon: '🧠', cat: 'content' },
  { name: 'sciomap',           desc: '科学星图 · 科学大师知识图谱',                   icon: '🔬', cat: 'content' },
  { name: 'x-follow-nav',      desc: 'X 关注分类导航 · 103个关注按主题分类',             icon: '🐦', cat: 'content' },
	  { name: 'twinverse',         desc: '孪生宇宙 · 项目聚合门户，自动同步所有项目',       icon: '🧬', cat: 'tool' },
	  { name: 'math-giants',       desc: '数学史上的二十位巨人 · 可视化传记',                icon: '🔢', cat: 'content' },
];

const CATS = {
  ai:      { label: 'AI 对话',       emoji: '🤖', cls: 'ai' },
  tool:    { label: '工具',           emoji: '🛠️', cls: 'tool' },
  content: { label: '内容精选',       emoji: '📖', cls: 'content' },
  data:    { label: '数据分析',       emoji: '📊', cls: 'data' },
};

var CAT_COLORS = { ai: "#4a7fc9", tool: "#c9a84c", content: "#c94a4a", data: "#8a6fc9" };
var animIndex = 0;
const NAME_MAP = {
  'population-report': '中国人口变局', 'zhihu-curated': '知乎精选：改变自己',
  'zhihu-wudao': '知乎精选：悟通道理', 'collection': '收藏管理系统',
  'research-frontiers': '科研前沿动态', 'project-atlas': '项目总览',
  'bookmarks': '书签导航', 'rss-reader': 'RSS 阅读器',
  'hot-trending': '热门趋势', 'vpn-guide': 'VPN 选购指南',
  'tool-collection': '实用工具集', 'cognitive-biases-atlas': '认知偏见图谱',
  'morris-quotes': 'Morris 语录集', 'ai-chat-room': 'AI 聊天室',
  'cosmic-discussion': '宇宙大爆炸对话', 'being-towards-death': '向死而生',
  'ocean-studio': '海洋工作室', 'philomap': '哲学星球',
  'teacher-trend': '教师招聘数据', 'writers-gallery': '百位作家画廊',
  'psychscope': '心理学大师图谱', 'sciomap': '科学星图',
  'x-follow-nav': 'X 关注导航', 'twinverse': '孪生宇宙',
  'math-giants': '数学史上的巨人',
};
function render(items) {
  animIndex = 0;
  const byCat = {};
  items.forEach(i => { (byCat[i.cat] = byCat[i.cat] || []).push(i); });
  const order = ["ai", "tool", "content", "data"];
  let html = "";
  order.forEach(cat => {
    const list = byCat[cat];
    if (!list) return;
    const info = CATS[cat];
    html += '<div class="section"><div class="section-title"><span class="emoji">' + info.emoji + '</span><h2>' + info.label + '</h2></div><div class="grid">';
    list.forEach(item => {
      var displayName = NAME_MAP[item.name] || item.name;
      html += '<a class="card" href="https://yun-ai-base.github.io/' + item.name + '/" target="_blank" rel="noopener" style="--card-cat:' + (CAT_COLORS[cat]||'#4a4844') + ';animation-delay:' + (animIndex++ * 0.04) + 's">';
      html += '<div class="card-icon ' + info.cls + '">' + item.icon + '</div>';
      html += '<div class="card-info"><div class="card-name">' + displayName + '</div><div class="card-desc">' + item.desc + '</div></div>';
      html += '<span class="card-arrow">→</span></a>';
    });
    html += '</div></div>';
  });
  document.getElementById('content').innerHTML = html;
  document.getElementById('count').textContent = items.length + ' 个项目';
}

(async function(){
  try {
    const r = await fetch('https://api.github.com/users/yun-ai-base/repos?per_page=100&sort=updated');
    if (!r.ok) throw Error('fail');
    const repos = await r.json();
    const pages = repos.filter(r => r.has_pages).map(r => {
      const f = FALLBACK.find(fb => fb.name === r.name);
      return { name: r.name, desc: r.description || (f ? f.desc : ''), icon: f ? f.icon : '📄', cat: f ? f.cat : 'tool' };
    });
    document.getElementById('loading').style.display = 'none';
    render(pages.length ? pages : FALLBACK);
    document.getElementById('status').textContent = '已同步 GitHub Pages · 自动更新';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    render(FALLBACK);
    document.getElementById('status').textContent = '离线模式 · 显示本地缓存';
  }
})();

// Search filter
var searchInput = document.getElementById("search");
if (searchInput) {
  searchInput.addEventListener("input", function(e) {
    var q = e.target.value.toLowerCase().trim();
    var cards = document.querySelectorAll(".card");
    if (!cards.length) return;
    cards.forEach(function(c) {
      var name = c.querySelector(".card-name").textContent.toLowerCase();
      var desc = c.querySelector(".card-desc").textContent.toLowerCase();
      c.style.display = (!q || name.indexOf(q) > -1 || desc.indexOf(q) > -1) ? "" : "none";
    });
    document.querySelectorAll(".section").forEach(function(s) {
      var hidden = s.querySelectorAll(".card[style*=\"display: none\"]").length;
      var total = s.querySelectorAll(".card").length;
      s.style.display = (hidden === total) ? "none" : "";
    });
  });
}
</script>

</body>
</html>
