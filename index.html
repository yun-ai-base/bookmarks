<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目导航 · yun-ai-base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --card: #121214;
  --card-hover: #1a1a1e;
  --border: #1e1e22;
  --text: #e4e2dd;
  --dim: #7a7872;
  --muted: #4a4844;
  --accent: #c9a84c;
  --accent-dim: rgba(201,168,76,0.12);
  --green: #4a9e6f;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}
.header {
  padding: 60px 24px 40px;
  text-align: center;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.02em;
  position: relative;
}
.header h1 span {
  background: linear-gradient(135deg, var(--accent), #e8d5a3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  margin-top: 8px;
  font-size: 14px;
  color: var(--dim);
  font-weight: 300;
}
.header .count {
  display: inline-block;
  margin-top: 16px;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 12px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(201,168,76,0.2);
}
.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 20px 80px;
}
.section { margin-bottom: 40px; }
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-title .emoji { font-size: 18px; }
.section-title h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  transition: all 0.25s;
  min-width: 0;
}
.card:hover {
  background: var(--card-hover);
  border-color: rgba(201,168,76,0.25);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.card-icon.ai { background: rgba(74,127,201,0.15); }
.card-icon.tool { background: var(--accent-dim); }
.card-icon.zh { background: rgba(201,74,74,0.15); }
.card-icon.data { background: rgba(138,111,201,0.15); }
.card-info { flex: 1; min-width: 0; }
.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-desc {
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-arrow {
  color: var(--muted);
  font-size: 14px;
  flex-shrink: 0;
  transition: transform 0.25s, color 0.25s;
}
.card:hover .card-arrow {
  transform: translateX(3px);
  color: var(--accent);
}
.footer {
  text-align: center;
  padding: 40px 24px;
  font-size: 12px;
  color: var(--muted);
}
.footer .dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 5px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--dim);
  font-size: 14px;
}
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 640px) {
  .header { padding: 40px 20px 30px; }
  .header h1 { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>yun-ai-base · <span>项目导航</span></h1>
  <p>所有 GitHub Pages 项目的统一入口</p>
  <div class="count" id="count">加载中…</div>
</div>

<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <div>正在获取项目列表…</div>
  </div>
  <div id="content"></div>
</div>

<div class="footer">
  <span class="dot"></span>
  <span id="status">自动同步 GitHub Pages 项目</span>
</div>

<script>
const FALLBACK = [
  { name: 'zhihu-curated',    desc: '知乎回答精选 · 用什么方法能尽快改变自己？', icon: '📖', cat: 'content' },
  { name: 'zhihu-wudao',      desc: '知乎回答精选 · 最近你悟通了什么道理/现象？', icon: '💡', cat: 'content' },
  { name: 'bookmarks',        desc: '个人书签导航页（就是本页）',                 icon: '🔖', cat: 'tool' },
  { name: 'rss-reader',       desc: 'RSS reader · 静态版',                       icon: '📡', cat: 'tool' },
  { name: 'hot-trending',     desc: 'Hot trending aggregator',                   icon: '🔥', cat: 'tool' },
  { name: 'ai-chat-room',     desc: 'AI 聊天室',                                 icon: '💬', cat: 'ai' },
  { name: 'cosmic-discussion',desc: '宇宙大爆炸 · AI 终端深度对话可视化',          icon: '🌌', cat: 'ai' },
  { name: 'being-towards-death', desc: '向死而生 · AI 终端哲学对话可视化',        icon: '🕯️', cat: 'ai' },
  { name: 'ocean-studio',     desc: '海洋工作室',                                icon: '🌊', cat: 'ai' },
  { name: 'teacher-trend',    desc: '江苏省教师招聘数据可视化分析',               icon: '📊', cat: 'data' },
];

const CATS = {
  ai:      { label: 'AI 对话',       emoji: '🤖', cls: 'ai' },
  tool:    { label: '工具',           emoji: '🛠️', cls: 'tool' },
  content: { label: '内容精选',       emoji: '📖', cls: 'zh' },
  data:    { label: '数据分析',       emoji: '📊', cls: 'data' },
};

function render(items) {
  const byCat = {};
  items.forEach(i => { (byCat[i.cat] = byCat[i.cat] || []).push(i); });
  const order = ['ai', 'tool', 'content', 'data'];
  let html = '';
  order.forEach(cat => {
    const list = byCat[cat];
    if (!list) return;
    const info = CATS[cat];
    html += `<div class="section">
      <div class="section-title"><span class="emoji">${info.emoji}</span><h2>${info.label}</h2></div>
      <div class="grid">`;
    list.forEach(item => {
      html += `<a class="card" href="https://yun-ai-base.github.io/${item.name}/" target="_blank" rel="noopener">
        <div class="card-icon ${info.cls}">${item.icon}</div>
        <div class="card-info">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
        </div>
        <span class="card-arrow">→</span>
      </a>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('content').innerHTML = html;
  document.getElementById('count').textContent = items.length + ' 个项目';
}

(async function(){
  try {
    const r = await fetch('https://api.github.com/users/yun-ai-base/repos?per_page=100&sort=updated');
    if (!r.ok) throw Error('fail');
    const repos = await r.json();
    const pages = repos.filter(r => r.has_pages).map(r => {
      const f = FALLBACK.find(fb => fb.name === r.name);
      return { name: r.name, desc: r.description || (f ? f.desc : ''), icon: f ? f.icon : '📄', cat: f ? f.cat : 'tool' };
    });
    document.getElementById('loading').style.display = 'none';
    render(pages.length ? pages : FALLBACK);
    document.getElementById('status').textContent = '已同步 GitHub Pages · 自动更新';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    render(FALLBACK);
    document.getElementById('status').textContent = '离线模式 · 显示本地缓存';
  }
})();
</script>

</body>
